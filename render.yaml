# F4.9-D4: Blueprint de Render para apps/api + su base de datos.
#
# Esto es preparación de código únicamente — no crea ningún recurso
# real. Desplegar de verdad requiere que el PO conecte este repo desde
# su propia cuenta de Render (Render lee este archivo automáticamente
# al crear un "Blueprint"), igual que con Clerk: no puedo crear cuentas
# ni recursos de terceros por mi cuenta.
#
# DECISIÓN PENDIENTE (el PO la está evaluando, ver conversación):
# el valor de NODE_ENV de este servicio. env.ts se niega a arrancar si
# NODE_ENV=production y AUTH_MODE=dev-bypass — guarda pedida
# explícitamente en F4.9 y que no se toca sin aprobación. Mientras
# Clerk siga diferido (decisión del PO, 2026-07-12), NODE_ENV acá debe
# quedar en "development" para que el servicio arranque; cambiar a
# "production" recién quedará habilitado cuando AUTH_MODE=clerk esté
# realmente activo. Ver docs/F4_9_PRODUCTION_AUTH_PLAN.md.
#
# F14 (preparación de despliegue, 2026-07-19): apps/marketing agregado
# como cuarto servicio (mismo patrón que apps/web) -- ver
# docs/RENDER_DEPLOYMENT.md para el orden de creación recomendado
# (db -> api -> web -> marketing) y docs/PRODUCTION_DEPLOYMENT.md para
# la vista general. 4 recursos reales en este blueprint hoy:
# ai-staffing-os-db, ai-staffing-os-api, ai-staffing-os-web,
# ai-staffing-os-marketing. Ningún worker: los 3 schedulers
# (prospecting/compliance/billing) corren dentro del mismo proceso de
# ai-staffing-os-api (ver apps/api/src/index.ts) -- no existe un
# proceso/servicio de worker separado en este repo, así que no se
# inventa uno acá.

databases:
  - name: ai-staffing-os-db
    plan: starter
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: web
    name: ai-staffing-os-api
    runtime: node
    plan: starter
    region: oregon
    branch: main
    # corepack activa la versión de pnpm fijada en package.json
    # ("packageManager"). --frozen-lockfile: nunca resuelve versiones
    # nuevas en el deploy, usa exactamente el lockfile commiteado.
    # prisma generate: el cliente de Prisma se genera en build, no en
    # git. migrate:deploy: aplica migraciones pendientes de forma no
    # interactiva (nunca "migrate dev", eso pediría confirmación).
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @ai-staffing-os/db run generate &&
      pnpm --filter @ai-staffing-os/db run migrate:deploy
    # start:deploy (apps/api/package.json) — sin el wrapper dotenv-cli
    # de "start": en Render no existe un archivo .env, las variables ya
    # llegan inyectadas en process.env por la plataforma.
    startCommand: pnpm --filter @ai-staffing-os/api run start:deploy
    # F12.7: /health/ready (no el /health original) -- verifica DB real +
    # migraciones aplicadas + el modo de auth activo bien configurado,
    # exactamente lo que Render necesita saber para decidir si esta
    # instancia puede recibir tráfico real. /health se mantiene sin
    # tocar para el banner de dev-bypass del frontend (ver app.ts) y
    # como liveness manual; Render usa /health/ready específicamente.
    healthCheckPath: /api/v1/health/ready
    envVars:
      - key: NODE_ENV
        value: development # ver "DECISIÓN PENDIENTE" arriba
      - key: AUTH_MODE
        value: dev-bypass
      - key: DEV_DEFAULT_USER_EMAIL
        value: admin@titan.dev
      - key: DATABASE_URL
        fromDatabase:
          name: ai-staffing-os-db
          property: connectionString
      # CORS — completar en el dashboard de Render con las URLs reales
      # una vez que apps/web/apps/marketing también estén desplegados
      # (ver F4.9-D2). Vacíos acá a propósito, nunca un dominio
      # hardcodeado en este archivo.
      - key: APP_ORIGIN
        sync: false
      - key: MARKETING_ORIGIN
        sync: false
      - key: API_ORIGIN
        sync: false
      # Proveedores opcionales (F2/F4.5/F4.6/F4.7) — el sistema funciona
      # sin ellos (cada uno se degrada honestamente, nunca inventa
      # datos); completar solo si el PO decide habilitarlos en este
      # entorno.
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: PEOPLEDATALABS_API_KEY
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      # Branding — mismo default real que .env.example (ver
      # apps/api/src/core/env.ts). Dominio se completa cuando el
      # dominio real esté conectado a este servicio.
      - key: BUSINESS_LEGAL_NAME
        value: "Data More LLC"
      - key: BUSINESS_BRAND_NAME
        value: "DreiStaff"
      - key: BUSINESS_DOMAIN
        sync: false
      - key: APP_DOMAIN
        sync: false
      - key: PUBLIC_TENANT_SLUG
        value: titan
      # Clerk — deliberadamente SIN entradas acá. Diferido (decisión del
      # PO, 2026-07-12); AUTH_MODE=dev-bypass no las necesita, y
      # agregarlas ahora sería revivir un trabajo explícitamente pausado.

  # F12.11: apps/web como sitio estático separado (mismo patrón que
  # cualquier deploy real de un SPA de Vite en Render) -- runtime:
  # static nunca ejecuta un proceso Node en producción, solo sirve los
  # archivos ya compilados en build. routes reescribe cualquier path a
  # index.html: es un SPA con client-side routing (react-router), sin
  # esto cualquier URL que no sea "/" devolvería 404 real del servidor
  # estático en un refresh o un link directo (ver F12.10, NotFound.tsx —
  # eso resuelve el 404 DENTRO de la app, esto asegura que la app llegue
  # a cargar primero).
  - type: web
    name: ai-staffing-os-web
    runtime: static
    region: oregon
    branch: main
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @ai-staffing-os/web run build
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # URL absoluta del servicio ai-staffing-os-api de arriba una vez
      # desplegado (ej. https://ai-staffing-os-api.onrender.com/api/v1)
      # — completar en el dashboard, nunca hardcodeada acá (mismo
      # criterio que APP_ORIGIN/API_ORIGIN del API).
      - key: VITE_API_URL
        sync: false
      # Mismo estado diferido que CLERK_* del API — ver arriba.
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false

  # F14: apps/marketing como sitio estático separado (mismo patrón que
  # ai-staffing-os-web arriba) -- landing pública (dreistaff.com), sin
  # tenancyMiddleware, habla únicamente con /api/v1/public/* del API.
  # buildCommand corre "generate-seo-files.mjs" (robots.txt/sitemap.xml,
  # lee BUSINESS_DOMAIN) automáticamente vía el script "build" de
  # apps/marketing/package.json antes de tsc -b/vite build.
  - type: web
    name: ai-staffing-os-marketing
    runtime: static
    region: oregon
    branch: main
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @ai-staffing-os/marketing run build
    staticPublishPath: apps/marketing/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # F14: apps/marketing/src/lib/api.ts ahora lee esto en vez de
      # asumir un path relativo -- necesario porque, a diferencia de dev
      # local (proxy de Vite), un sitio estático de Render no tiene
      # ningún proceso que pueda reenviar /api/* al servicio real de
      # ai-staffing-os-api. Completar en el dashboard con la URL
      # absoluta real del API (ej. https://ai-staffing-os-api.onrender.com,
      # SIN el sufijo /api/v1/public — eso ya lo agrega el código).
      - key: VITE_API_URL
        sync: false
      # F14: leída en build-time por scripts/generate-seo-files.mjs
      # (robots.txt/sitemap.xml) — mismo dominio real que BUSINESS_DOMAIN
      # del servicio ai-staffing-os-api de arriba, nunca hardcodeado acá.
      - key: BUSINESS_DOMAIN
        sync: false

services:
  postgres:
    image: postgres:16
    container_name: ai-staffing-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: staffing
      POSTGRES_PASSWORD: staffing
      POSTGRES_DB: ai_staffing_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staffing -d ai_staffing_os"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

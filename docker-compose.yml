services:
  postgres:
    image: postgres:16
    container_name: ai-staffing-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: staffing
      POSTGRES_PASSWORD: staffing
      POSTGRES_DB: ai_staffing_os
    ports:
      # Host port 5433 (not 5432): this machine already runs a local
      # Postgres via Homebrew on 5432, which macOS resolves ahead of
      # Docker's proxy for "localhost". Mapping to 5433 avoids fighting
      # over the port instead of touching an unrelated existing service.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staffing -d ai_staffing_os"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
